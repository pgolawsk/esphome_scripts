---
#* Base configuration for ESP-32 variants (C3, C6, S2, S3) board
#! This is a variant of board_esp32.yaml WITHOUT minimum_chip_revision
#! Use this for C3, C6, S2, S3 variants as they don't support minimum_chip_revision

# Pawelo, 20260124, created as variant of board_esp32.yaml for C3/C6/S2/S3 without minimum_chip_revision

#! those values are examples, not used in this file, need to be declared outside of this file
# substitutions:
#   framework_type: esp-idf # "arduino" or "esp-idf"
#   framework_version: recommended # or specific version like "latest", "recommended", "4.4.4"
#   board_variant: "" # empty for ESP32, other values to display like c3, c6, s2, s3
#   board: "esp32dev" # like: esp32dev, esp32cam, esp32-c3-devkitm-1, esp32-c6-devkitm-1, esp32-s3-devkitc-1, esp32-s2-saola-1, full list here https://registry.platformio.org/platforms/platformio/espressif32/boards?version=5.3.0
#   flash_size: 4MB # One of 2MB, 4MB, 8MB, 16MB or 32MB
#   flash_write_interval: "5min"

esphome:
  name: $devicename
  friendly_name: $room
  area: $room
  comment: $room ESP32${board_variant} with $devices
#  platform: ESP8266   # OLD notation
  project:
    name: $project_name
    version: $version

  # platformio_options:
  #   board_build.sdkconfig_defaults: sdkconfig.defaults
  #   build_flags:
  #     # increase max sockets to avoid httpd accept errors
  #     - -DCONFIG_HTTPD_MAX_OPEN_SOCKETS=8
  #     - -DCONFIG_LWIP_MAX_SOCKETS=16

esp32:
  board: ${board} # like: esp32dev, esp32cam, esp32-c3-devkitm-1, esp32-c6-devkitm-1, esp32-s3-devkitc-1, esp32-s2-saola-1, full list here https://registry.platformio.org/platforms/platformio/espressif32/boards?version=5.3.0
  flash_size: ${flash_size} # One of 2MB, 4MB, 8MB, 16MB or 32MB
#  restore_from_flash: true
  framework:
    type: ${framework_type} # arduino or esp-idf
    version: ${framework_version} # like: latest, recommended, 4.4, ...

    # only for ESP-IDF
    #warn: moved to sdkconfig.defaults file
    # sdkconfig_options:
    #   # CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
    #   CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
    #   CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
    #   CONFIG_AUDIO_BOARD_CUSTOM: "y"
    #   # some of LWIP options removed those 2 info/errors messages from logs:
    #   # [I][esp-idf:000][httpd]: E (39736) httpd: httpd_accept_conn: error in accept (23)
    #   # [I][esp-idf:000][httpd]: W (39742) httpd: httpd_server: error accepting new connection
    #   CONFIG_LWIP_SO_LINGER: "y"
    #   CONFIG_LWIP_MAX_SOCKETS: "16"
    #   CONFIG_LWIP_MAX_ACTIVE_TCP: "16"
    #   CONFIG_LWIP_TCP_MAXRTX: "12"
    #   CONFIG_LWIP_TCP_SYNMAXRTX: "6"
    #   CONFIG_LWIP_TCP_RECVMBOX_SIZE: "12"
    #   # LWIP_STATS eliminated 104 error
    #   # [I][esp-idf:000][httpd]: W (605634) httpd_txrx: httpd_sock_err: error in recv : 104
    #   CONFIG_LWIP_TCPIP_RECVMBOX_SIZE: "48"
    #   CONFIG_LWIP_STATS: "y"
      # # Let HTTP server evict oldest connections when hitting limits
      # CONFIG_HTTPD_PURGE_BUF_LEN: "32"
      # CONFIG_HTTPD_MAX_OPEN_SOCKETS: "7"
      # # Make closed sockets free resources immediately (so_linger)
      # CONFIG_HTTPD_SOCK_LISTENER_LINGER: "y"
      # CONFIG_HTTPD_SOCK_CLIENT_LINGER: "y"

preferences:
  flash_write_interval: ${flash_write_interval}

<<: !include wifi.yaml
<<: !include api.yaml
<<: !include ota.yaml
<<: !include logger.yaml
# <<: !include { file: web_server_basic.yaml, vars: { ota_enabled: false, web_server_version: 1 } } # ver 1 or 2 only
<<: !include { file: web_server.yaml, vars: { ota_enabled: false, web_server_version: 3 } } # ver 3 only
<<: !include time_sntp.yaml
<<: !include sun.yaml
<<: !include prometheus.yaml
<<: !include mqtt.yaml
