---
#* Enable WiFi, including fallback hotspot
#*
#* Default WiFi include — loaded by every board file. To switch a specific device
#* to a different network, add ONE line below BEFORE the board include in the
#* device file (override-by-order: first `<<: !include` wins; see AGENTS.md
#* "YAML Override Mechanism"):
#*
#*   <<: !include ../includes/wifi_main.yaml       # main router (different SSID secret + reboot_timeout)
#*   <<: !include ../includes/wifi_outside.yaml    # outdoor AP (separate SSID, power_save_mode tweaks)
#*   <<: !include ../includes/wifi__bssid.yaml     # lock to specific BSSID (same SSID on multiple APs)
#*   <<: !include ../includes/wifi_multi.yaml      # multi-network fallback (#! see file header warning)
#*
# Pawelo, 20221119, created as my framework based on !include statements
# Pawelo, 20221127, shortened WiFi SSID for fallback mode as it cannot be longer than 32 characters
# Pawelo, 20230125, shortened further WiFi SSID for fallback mode by removing $room, as it cannot be longer than 32 characters
# Pawelo, 20231031, added 2nd and 3rd WiFi network if primary is down
# Pawelo, 20231103, restored to connect to specific 1 network only
# Pawelo, 20251122, added min_auth_mode: WPA2 to avoid connecting to insecure networks
# Pawelo, 20251218, added power_save_mode: none to avoid issues with some APs
# FLUX, 20260511, Added docstring header listing wifi variants + switch instructions (BACKLOG item 19)
# FLUX, 20260514, Removed wifi_extended.yaml + wifi_extended2.yaml (zero active consumers; menu lines pruned from docstring) (BACKLOG #35)

wifi:
  min_auth_mode: WPA2
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      hidden: true
    # - ssid: !secret wifi2_ssid
    #   password: !secret wifi2_password
    #   hidden: true
    # - ssid: !secret wifi3_ssid
    #   password: !secret wifi3_password
    #   hidden: true
  domain: ""
  fast_connect: true
  reboot_timeout: 45min
  # power_save_mode: none

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "$devicename Recovery"
    password: !secret wifi_fallback_password

captive_portal:
