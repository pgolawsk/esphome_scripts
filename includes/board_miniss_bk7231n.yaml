---
# * Base configuration for BK7231N board Mini Smart Switch
# Pawelo 20230311, created as copy of board_esp32.yaml and https://www.elektroda.pl/rtvforum/topic3912748.html
# Pawelo, 20241115, added area and friendly name
# Pawelo, 20250413, added web_server_basic.yaml to avoid sorting groups (not supported in 2.x)
# FLUX, 20260510, Wired min_version: ${esphome_min_version} per BACKLOG item 9
# FLUX, 20260512, Added Jinja `|default("2025.8.0")` to min_version so devices without `esphome_min_version` declaration get a sane floor (BACKLOG #10 refinement)
# FLUX, 20260512, Added Jinja defaults: project_name ("pgolawsk.esp_home") (Jinja default pattern extension, mirrors BACKLOG #10)
# FLUX, 20260515, Migrated libretuya → bk72xx (chip-split per ESPHome 2025.x); lt_config.LT_UART_DEFAULT_PORT → framework.uart_port; added wifi_bk72xx.yaml override (no min_auth_mode); uncommented `<<: !include mqtt.yaml` — nested include works in current ESPHome (BACKLOG #46)

esphome:
  name: $devicename
  friendly_name: $room
  area: $room
  min_version: ${esphome_min_version | default("2025.8.0")}
  comment: $room BK7231N controller with $devices
#  platform: ESP8266   # OLD notation
  project:
    name: ${project_name | default("pgolawsk.esp_home")}
    version: $version

bk72xx:
  board: generic-bk7231n-qfn32-tuya
  framework:
    version: latest
    uart_port: 1

preferences:
  flash_write_interval: 1min

<<: !include wifi_bk72xx.yaml  #! bk72xx variant — wins via first-key-wins over wifi.yaml below (bk72xx rejects min_auth_mode)
<<: !include wifi.yaml
<<: !include api.yaml
<<: !include ota.yaml
<<: !include logger.yaml
# <<: !include {file: web_server_basic.yaml, vars: {ota_enabled: false, web_server_version: 1}} # ver 1 or 2 only
<<: !include {file: web_server.yaml, vars: {ota_enabled: false, web_server_version: 3}}  # ver 3 only
<<: !include time_sntp.yaml
<<: !include sun.yaml
<<: !include prometheus.yaml
<<: !include mqtt.yaml
