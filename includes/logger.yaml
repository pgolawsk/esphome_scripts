---
#* Enable logging (parameterized level + baud_rate via Jinja defaults)
# Pawelo, 20221119, created as my framework based on !include statements
# Pawelo, 20230728, added component as ERROR to get rid of warning that sensor check should not be longer than 200-300ms
# Pawelo, 20230929, back to WARN log level, as seams 2023.9.1 resolved issue with sensor warnings taken too long to operate
# Pawelo, 20250103, excluded WARN(ING) from tcs34725 as it clutters logs too much
# Pawelo, 20250208, excluded INFO from weact_2.90_3c as it clutters logs too much
# Pawelo, 20251130, excluded INFO from sgp30 as it clutters logs too much
# FLUX, 20260514, Merged logger_level.yaml into logger.yaml via Jinja `|default(...)` for level + baud_rate; unified logs: superset; removed weact_2.90_3c entry (no longer used — replaced by epaper_spi) (BACKLOG #15 + #43)

logger:
  #  level: NONE, ERROR, WARN, INFO, DEBUG (default), VERBOSE, VERY_VERBOSE
  level: ${level | default("INFO")}
  baud_rate: ${baud_rate | default(0)}  # 0 = disable UART logging
  logs:
    mqtt.component: INFO
    mqtt.client: INFO
    # disable some interfaces logs to reduce clutter
    mqtt: INFO
    mqtt.idf: INFO
    sensor: INFO
    i2c: INFO
    i2c.idf: INFO
    component: ERROR
    tcs34725: ERROR
    sgp30: WARN
    # debug of specific components
    # epaper_spi: DEBUG
    # epaper_spi.weact_3c: DEBUG
    # epaper_spi: VERBOSE
    # epaper_spi.weact_3c: VERBOSE
