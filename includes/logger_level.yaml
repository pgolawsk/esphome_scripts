---
#* Enable logging with particular logging level
# Pawelo, 20241117, created based on logger.yaml, added manageable log level
# Pawelo, 20241119, added baud rate as variable
# Pawelo, 20250103, excluded WARN(ING) from tcs34725

logger:
  #  level: NONE, ERROR, WARN, INFO, DEBUG (default), VERBOSE, VERY_VERBOSE
  level: ${level}
  # disable UART logging
  baud_rate: ${baud_rate}
  logs:
    mqtt.component: INFO
    mqtt.client: INFO
    # disable some interfaces logs to reduce clutter
    mqtt: INFO
    mqtt.idf: INFO
    sensor: INFO
    i2c: INFO
    i2c.idf: INFO
    component: DEBUG
    # component: ERROR
    # disable some specific components to reduce clutter
    waveshare_epaper: WARN
    weact_2.90_3c: WARN
    sgp30: WARN
    tcs34725: ERROR
    # debug of specific components
    epaper_spi: VERBOSE
    epaper_spi.weact_3c: VERBOSE
