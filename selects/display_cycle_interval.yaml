---
#* Select for Display Refresh Interval
# Pawelo, 20231010, created based on https://esphome.io/components/select/index.html
# Pawelo, 20231012, added setting global variable and refresh display on select change
# Pawelo, 20240628, eliminated 5s and 15s as too short - due to display refresh min should be >30sec
# Pawelo, 20240907, set entity_category and icon for sensor values
# Pawelo, 20260202, changed initial value for display cycle page to 60 (to match 5min interval)
# Pawelo, 20260203, changed unknown value to 5min from 1min
# Pawelo, 20260214, changed the counter for 1min instead of 5s

platform: template
name: "$room Display Refresh Interval"
id: select_display_cycle_interval
icon: mdi:cog-sync-outline
entity_category: config
options:
  - "Never"
  # - "5s"
  # - "15s"
  - "1min"
  - "5min"
  - "15min"
  - "1h"
initial_option: "5min"
# restore_value: true
optimistic: true
on_value:
  - lambda: |-
      if(x == "Never") {
        id(${global_variable}) = -1;
      // } else if(x == "5s") {
      //   id(${global_variable}) = 1;
      // } else if(x == "15s") {
      //   id(${global_variable}) = 3;
      } else if(x == "1min") {
        id(${global_variable}) = 1;
      } else if(x == "5min") {
        id(${global_variable}) = 5;
      } else if(x == "15min") {
        id(${global_variable}) = 15;
      } else if(x == "1h") {
        id(${global_variable}) = 60;
      } else {
          id(${global_variable}) = 5;
          ESP_LOGW("select", "Unknown value on the list, assuming 5min.");
      }
  - component.update: ${display_id}
