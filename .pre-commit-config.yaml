#* pre-commit config for esphome_scripts
# HAL 20260504 - ESPHome YAML: unsafe mode for custom tags (!secret, !include, !lambda),
#                yamllint with key-duplicates disabled (intentional override pattern)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-added-large-files
        args: ["--maxkb=5000"]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [--config-file, .yamllint]

  - repo: https://github.com/gitguardian/ggshield
    rev: v1.50.0
    hooks:
      - id: ggshield
        language_version: python3
        stages: [pre-commit]
        args: [secret, scan, pre-commit, --no-fail-on-server-error]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
