#* pre-commit config for esphome_scripts
# HAL 20260504 - ESPHome YAML: unsafe mode for custom tags (!secret, !include, !lambda),
#                yamllint with key-duplicates disabled (intentional override pattern)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-added-large-files
        args: ["--maxkb=5000"]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [--config-file, .yamllint]

  - repo: https://github.com/gitguardian/ggshield
    rev: v1.50.0
    hooks:
      - id: ggshield
        language_version: python3
        stages: [pre-commit]
        args: [secret, scan, pre-commit, --no-fail-on-server-error]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # Local hooks guarding the override-by-order merge-key pattern (BACKLOG #65)
  - repo: local
    hooks:
      - id: yaml-include-resolve
        name: every YAML include reference resolves (case-exact, file exists)
        entry: tools/check_includes.py
        language: python
        types: [yaml]
        exclude: ^(deprecated/|.*/\.esphome/|.*/build/)

      - id: yaml-merge-syntax
        name: merge key must be followed by include or anchor
        entry: tools/check_merge_syntax.py
        language: python
        types: [yaml]
        exclude: ^(deprecated/|.*/\.esphome/|.*/build/)

      - id: yaml-shape
        name: device files in 0_DEV/1_UAT/2_PROD should pull a board include
        entry: tools/check_yaml_shape.py
        language: python
        types: [yaml]
        files: ^(0_DEV|1_UAT|2_PROD)/
        exclude: ^(deprecated/|.*/\.esphome/|.*/build/)

      - id: yaml-version-bump
        name: bump `version:` substitution in staged YAML to today's date (BACKLOG #26)
        entry: tools/bump_yaml_version.py
        language: python
        types: [yaml]
        files: ^(0_DEV|1_UAT|2_PROD)/
        exclude: ^(deprecated/|.*/\.esphome/|.*/build/)
