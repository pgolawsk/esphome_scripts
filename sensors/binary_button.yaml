---
#* Generic button on GPIO
# Pawelo, 20250207, created based on binary_display_button.yaml

platform: gpio
pin:
  number: ${gpio}
  mode:
    input: true
    pullup: true
  inverted: ${inverted}
name: "$room Display Button ${ix}"
id: g_button${ix}
entity_category: ""
icon: mdi:radiobox-blank
state_topic: $devicename/g_button${ix}
